<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>My weather app</title><script defer="defer" src="main.js"></script></head><body><div class="container"><h1>My weather app</h1><main class="main"><form action=""><label for="city">My city</label> <input name="city" id="city" pattern="[A-Za-z ]+" required/> <input type="submit" value="Go !"/></form><div class="forecast"><h2>The weather in <span class="city" id="city-holder"></span> :</h2><div class="loader">En attente</div><ul class="weather-infos"><li class="weather-info datetime" id="datetime-holder"></li><li class="weather-info conditions" id="conditions-holder"></li><li class="weather-info icon" id="icon-holder"></li><li class="weather-info temp" id="temp-holder"></li></ul></div></main></div></body></html>
